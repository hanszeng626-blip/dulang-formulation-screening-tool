    <text x="0" y="82" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="24" font-weight="600" fill="#2563eb">处方筛选综合工具</text>
    <text x="0" y="113" font-family="Arial, sans-serif" font-size="16" letter-spacing="2" fill="#64748b">FORMULATION DEVELOPMENT WORKSPACE</text>
  </g>
