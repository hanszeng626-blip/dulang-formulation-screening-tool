<svg xmlns="http://www.w3.org/2000/svg" width="640" height="180" viewBox="0 0 640 180" role="img" aria-labelledby="title desc">
  <title id="title">独狼制剂处方筛选综合工具 Logo</title>
  <desc id="desc">A compact green and blue mark for Dulang formulation screening tool.</desc>
  <defs>
    <linearGradient id="markGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity=".16"/>
    </filter>
  </defs>

  <rect width="640" height="180" rx="28" fill="#f8fafc"/>
  <rect x="16" y="16" width="608" height="148" rx="24" fill="#ffffff" stroke="#dbe3ef"/>

